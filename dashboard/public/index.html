<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Berber Paneli</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0f0e0c;--surface:#1a1814;--border:#2a2620;--gold:#c9a84c;--gold-dim:#7a6330;--text:#e8e0d0;--muted:#7a7268;--danger:#c0392b;--success:#27ae60;--pending:#c9a84c;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;}
  /* LOGIN */
  #login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 0%,#2a1f0a 0%,#0f0e0c 70%);}
  .login-box{width:380px;padding:48px 40px;border:1px solid var(--border);background:var(--surface);}
  .login-logo{font-family:'Playfair Display',serif;font-size:28px;color:var(--gold);letter-spacing:2px;margin-bottom:8px;}
  .login-sub{color:var(--muted);font-size:13px;margin-bottom:36px;letter-spacing:1px;text-transform:uppercase;}
  .field{margin-bottom:20px;}
  .field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:8px;}
  .field input,.field select,.field textarea{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:12px 14px;font-family:'DM Sans',sans-serif;font-size:15px;outline:none;transition:border-color .2s;}
  .field input:focus,.field select:focus,.field textarea:focus{border-color:var(--gold-dim);}
  .field select option{background:var(--bg);}
  .field textarea{resize:vertical;min-height:80px;}
  .btn-primary{width:100%;padding:14px;background:var(--gold);color:#0f0e0c;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:opacity .2s;margin-top:8px;}
  .btn-primary:hover{opacity:.85;}
  .btn-primary:disabled{opacity:.4;cursor:not-allowed;}
  .btn-sm{padding:6px 14px;font-size:11px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif;border:1px solid;transition:all .2s;}
  .btn-confirm{background:none;border-color:var(--success);color:var(--success);}
  .btn-confirm:hover{background:var(--success);color:#000;}
  .btn-cancel{background:none;border-color:var(--danger);color:var(--danger);}
  .btn-cancel:hover{background:var(--danger);color:#fff;}
  .btn-complete{background:none;border-color:var(--muted);color:var(--muted);}
  .btn-complete:hover{background:var(--muted);color:#000;}
  .btn-new{background:var(--gold);color:#0f0e0c;border-color:var(--gold);padding:10px 20px;font-size:12px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif;border:none;}
  .btn-new:hover{opacity:.85;}
  .error-msg{color:var(--danger);font-size:13px;margin-top:14px;display:none;}
  /* DASHBOARD */
  #dashboard-screen{display:none;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:20px 32px;border-bottom:1px solid var(--border);background:var(--surface);}
  .topbar-logo{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold);letter-spacing:1px;}
  .topbar-right{display:flex;align-items:center;gap:20px;}
  .barber-name{font-size:13px;color:var(--muted);}
  .btn-logout{background:none;border:1px solid var(--border);color:var(--muted);padding:7px 16px;font-size:12px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;font-family:'DM Sans',sans-serif;transition:all .2s;}
  .btn-logout:hover{border-color:var(--gold-dim);color:var(--text);}
  .main{padding:32px;max-width:1100px;margin:0 auto;}
  .date-header{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:32px;}
  .date-left{display:flex;align-items:baseline;gap:16px;}
  .date-big{font-family:'Playfair Display',serif;font-size:36px;color:var(--text);}
  .date-sub{color:var(--muted);font-size:14px;}
  .summary-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:36px;}
  .summary-card{background:var(--surface);border:1px solid var(--border);padding:24px 20px;}
  .summary-label{font-size:11px;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:10px;}
  .summary-value{font-family:'Playfair Display',serif;font-size:32px;color:var(--gold);}
  .summary-unit{font-size:13px;color:var(--muted);margin-top:4px;}
  .date-nav{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
  .btn-nav{background:var(--surface);border:1px solid var(--border);color:var(--muted);width:36px;height:36px;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;}
  .btn-nav:hover{border-color:var(--gold-dim);color:var(--text);}
  input[type="date"]{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:8px 12px;font-family:'DM Sans',sans-serif;font-size:14px;outline:none;cursor:pointer;}
  input[type="date"]:focus{border-color:var(--gold-dim);}
  .section-title{font-size:11px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:16px;padding-bottom:10px;border-bottom:1px solid var(--border);}
  .appointment-list{display:flex;flex-direction:column;gap:8px;}
  .appointment-row{display:grid;grid-template-columns:80px 1fr 160px 100px 120px 140px;align-items:center;gap:12px;padding:16px 20px;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--border);transition:border-color .2s;}
  .appointment-row:hover{border-left-color:var(--gold-dim);}
  .appointment-row.status-confirmed{border-left-color:var(--success);}
  .appointment-row.status-pending{border-left-color:var(--pending);}
  .appointment-row.status-cancelled{opacity:.4;}
  .appt-time{font-family:'Playfair Display',serif;font-size:18px;color:var(--gold);}
  .appt-name{font-size:15px;color:var(--text);}
  .appt-phone{font-size:12px;color:var(--muted);margin-top:2px;}
  .appt-service{font-size:12px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
  .appt-price{font-size:15px;color:var(--text);text-align:right;}
  .status-badge{display:inline-block;padding:4px 10px;font-size:10px;text-transform:uppercase;letter-spacing:1px;border:1px solid;text-align:center;}
  .badge-pending{color:var(--pending);border-color:var(--pending);}
  .badge-confirmed{color:var(--success);border-color:var(--success);}
  .badge-completed{color:var(--muted);border-color:var(--muted);}
  .badge-cancelled{color:var(--danger);border-color:var(--danger);}
  .appt-actions{display:flex;gap:6px;flex-wrap:wrap;}
  .empty-state{text-align:center;padding:60px 20px;color:var(--muted);font-size:14px;border:1px solid var(--border);background:var(--surface);}
  .loading{text-align:center;padding:40px;color:var(--muted);font-size:13px;letter-spacing:1px;}
  .spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin .8s linear infinite;margin-right:8px;vertical-align:middle;}
  @keyframes spin{to{transform:rotate(360deg);}}
  /* MODAL */
  .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:1000;}
  .modal-overlay.open{display:flex;}
  .modal{background:var(--surface);border:1px solid var(--border);padding:40px;width:500px;max-height:90vh;overflow-y:auto;}
  .modal-title{font-family:'Playfair Display',serif;font-size:22px;color:var(--gold);margin-bottom:24px;}
  .modal-actions{display:flex;gap:12px;margin-top:24px;}
  .btn-modal-save{flex:1;padding:12px;background:var(--gold);color:#0f0e0c;border:none;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;letter-spacing:2px;text-transform:uppercase;cursor:pointer;}
  .btn-modal-save:hover{opacity:.85;}
  .btn-modal-cancel{flex:1;padding:12px;background:none;border:1px solid var(--border);color:var(--muted);font-family:'DM Sans',sans-serif;font-size:13px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;}
  .btn-modal-cancel:hover{border-color:var(--gold-dim);color:var(--text);}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-logo">✂ Berber</div>
    <div class="login-sub">Yönetim Paneli</div>
    <div class="field"><label>Telefon</label><input type="tel" id="login-phone" placeholder="+905551234567"/></div>
    <div class="field"><label>Şifre</label><input type="password" id="login-password" placeholder="••••••"/></div>
    <button class="btn-primary" id="login-btn" onclick="doLogin()">Giriş Yap</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<!-- DASHBOARD -->
<div id="dashboard-screen">
  <div class="topbar">
    <div class="topbar-logo">✂ Berber Paneli</div>
    <div class="topbar-right">
      <span class="barber-name" id="barber-name-display"></span>
      <button class="btn-logout" onclick="doLogout()">Çıkış</button>
    </div>
  </div>
  <div class="main">
    <div class="date-header">
      <div class="date-left">
        <div class="date-big" id="display-date"></div>
        <div class="date-sub" id="display-day"></div>
      </div>
      <button class="btn-new" onclick="openNewModal()">+ Yeni Randevu</button>
    </div>
    <div class="summary-grid">
      <div class="summary-card"><div class="summary-label">Toplam Randevu</div><div class="summary-value" id="stat-total">—</div><div class="summary-unit">bugün</div></div>
      <div class="summary-card"><div class="summary-label">Onaylanan</div><div class="summary-value" id="stat-confirmed">—</div><div class="summary-unit">randevu</div></div>
      <div class="summary-card"><div class="summary-label">Bekleyen</div><div class="summary-value" id="stat-pending">—</div><div class="summary-unit">randevu</div></div>
      <div class="summary-card"><div class="summary-label">Tahmini Gelir</div><div class="summary-value" id="stat-revenue">—</div><div class="summary-unit">TL</div></div>
    </div>
    <div class="date-nav">
      <button class="btn-nav" onclick="changeDay(-1)">‹</button>
      <input type="date" id="date-picker" onchange="loadAppointments()"/>
      <button class="btn-nav" onclick="changeDay(1)">›</button>
    </div>
    <div class="section-title">Günlük Program</div>
    <div id="appointments-container"><div class="loading"><span class="spinner"></span> Yükleniyor...</div></div>
  </div>
</div>

<!-- YENİ RANDEVU MODAL -->
<div class="modal-overlay" id="modal-new">
  <div class="modal">
    <div class="modal-title">Yeni Randevu</div>
    <div class="field"><label>Müşteri Adı</label><input type="text" id="new-name" placeholder="Ad Soyad"/></div>
    <div class="field"><label>Telefon</label><input type="tel" id="new-phone" placeholder="+905551234567"/></div>
    <div class="field"><label>Hizmet</label>
      <select id="new-service"><option value="">Yükleniyor...</option></select>
    </div>
    <div class="field"><label>Tarih & Saat</label><input type="datetime-local" id="new-datetime"/></div>
    <div class="field"><label>Süre (dakika)</label><input type="number" id="new-duration" value="30" min="10" max="240"/></div>
    <div class="field"><label>Fiyat (TL)</label><input type="number" id="new-price" placeholder="0" min="0"/></div>
    <div class="field"><label>Not</label><textarea id="new-notes" placeholder="Opsiyonel..."></textarea></div>
    <div id="new-error" class="error-msg"></div>
    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="closeModal('modal-new')">İptal</button>
      <button class="btn-modal-save" onclick="saveNewAppointment()">Kaydet</button>
    </div>
  </div>
</div>

<!-- DURUM GÜNCELLE MODAL -->
<div class="modal-overlay" id="modal-status">
  <div class="modal">
    <div class="modal-title">Randevu Güncelle</div>
    <div id="modal-status-info" style="color:var(--muted);font-size:14px;margin-bottom:20px;"></div>
    <div class="field"><label>Durum</label>
      <select id="update-status">
        <option value="pending">Bekliyor</option>
        <option value="confirmed">Onaylı</option>
        <option value="completed">Tamamlandı</option>
        <option value="cancelled">İptal</option>
      </select>
    </div>
    <div class="field"><label>Fiyat (TL)</label><input type="number" id="update-price" min="0"/></div>
    <div class="field"><label>Not</label><textarea id="update-notes"></textarea></div>
    <div class="modal-actions">
      <button class="btn-modal-cancel" onclick="closeModal('modal-status')">İptal</button>
      <button class="btn-modal-save" onclick="saveStatusUpdate()">Güncelle</button>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:3000';
const DAYS = ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
const MONTHS = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
const STATUS_TR = {pending:'Bekliyor',confirmed:'Onaylı',completed:'Tamamlandı',cancelled:'İptal'};

let token = localStorage.getItem('berber_token');
let currentUser = JSON.parse(localStorage.getItem('berber_user')||'null');
let services = [];
let editingAppointmentId = null;

if(token && currentUser) showDashboard();

document.getElementById('login-password')?.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});

async function doLogin(){
  const phone=document.getElementById('login-phone').value.trim();
  const password=document.getElementById('login-password').value;
  const btn=document.getElementById('login-btn');
  const err=document.getElementById('login-error');
  err.style.display='none';btn.disabled=true;btn.textContent='Giriş yapılıyor...';
  try{
    const res=await fetch(`${API}/api/auth/login`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone,password})});
    const data=await res.json();
    if(!res.ok)throw new Error(data.error||'Giriş başarısız');
    token=data.token;currentUser=data.user;
    localStorage.setItem('berber_token',token);localStorage.setItem('berber_user',JSON.stringify(currentUser));
    showDashboard();
  }catch(e){err.textContent=e.message;err.style.display='block';}
  finally{btn.disabled=false;btn.textContent='Giriş Yap';}
}

function doLogout(){
  localStorage.removeItem('berber_token');localStorage.removeItem('berber_user');
  token=null;currentUser=null;
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('dashboard-screen').style.display='none';
}

async function showDashboard(){
  document.getElementById('login-screen').style.display='none';
  document.getElementById('dashboard-screen').style.display='block';
  document.getElementById('barber-name-display').textContent=currentUser?.name||'';
  const picker=document.getElementById('date-picker');
  picker.value=todayStr();
  updateDateHeader(new Date());
  await loadServices();
  loadAppointments();
}

async function loadServices(){
  try{
    const res=await fetch(`${API}/api/services/services/list`,{headers:{'Authorization':`Bearer ${token}`}});
    services=await res.json();
    const sel=document.getElementById('new-service');
    sel.innerHTML='<option value="">-- Hizmet Seçin --</option>';
    let lastType='';
    services.forEach(s=>{
      if(s.businessType!==lastType){
        const og=document.createElement('optgroup');
        og.label={berber:'💈 Berber',kuafor:'✂️ Kuaför',guzellik_merkezi:'💅 Güzellik Merkezi'}[s.businessType]||s.businessType;
        sel.appendChild(og);lastType=s.businessType;
      }
      const op=document.createElement('option');
      op.value=s.code;op.textContent=`${s.category} — ${s.name}`;
      op.dataset.duration=s.defaultDuration;op.dataset.priceMin=s.priceMin||0;
      sel.appendChild(op);
    });
  }catch(e){console.error(e);}
}

function todayStr(){return new Date().toISOString().split('T')[0];}

function updateDateHeader(date){
  document.getElementById('display-date').textContent=`${date.getDate()} ${MONTHS[date.getMonth()]} ${date.getFullYear()}`;
  document.getElementById('display-day').textContent=DAYS[date.getDay()];
}

function changeDay(delta){
  const picker=document.getElementById('date-picker');
  const d=new Date(picker.value);d.setDate(d.getDate()+delta);
  picker.value=d.toISOString().split('T')[0];loadAppointments();
}

async function loadAppointments(){
  const picker=document.getElementById('date-picker');
  const date=new Date(picker.value+'T00:00:00');
  updateDateHeader(date);
  const container=document.getElementById('appointments-container');
  container.innerHTML='<div class="loading"><span class="spinner"></span> Yükleniyor...</div>';
  ['stat-total','stat-confirmed','stat-pending','stat-revenue'].forEach(id=>document.getElementById(id).textContent='—');
  try{
    const res=await fetch(`${API}/api/appointments/barber/${currentUser.id}`,{headers:{'Authorization':`Bearer ${token}`}});
    if(res.status===401){doLogout();return;}
    const all=await res.json();
    const dayStart=new Date(picker.value+'T00:00:00');
    const dayEnd=new Date(picker.value+'T23:59:59');
    const appts=all.filter(a=>{const d=new Date(a.appointmentDate);return d>=dayStart&&d<=dayEnd;}).sort((a,b)=>new Date(a.appointmentDate)-new Date(b.appointmentDate));
    const total=appts.length;
    const confirmed=appts.filter(a=>a.status==='confirmed').length;
    const pending=appts.filter(a=>a.status==='pending').length;
    const revenue=appts.filter(a=>a.status!=='cancelled').reduce((s,a)=>s+(a.price||0),0);
    document.getElementById('stat-total').textContent=total;
    document.getElementById('stat-confirmed').textContent=confirmed;
    document.getElementById('stat-pending').textContent=pending;
    document.getElementById('stat-revenue').textContent=revenue;
    if(!appts.length){container.innerHTML='<div class="empty-state">Bu gün için randevu bulunmuyor.</div>';return;}
    container.innerHTML='<div class="appointment-list">'+appts.map(a=>{
      const t=new Date(a.appointmentDate);
      const hh=String(t.getHours()).padStart(2,'0');
      const mm=String(t.getMinutes()).padStart(2,'0');
      const svc=services.find(s=>s.code===a.serviceType);
      const svcName=svc?svc.name:a.serviceType;
      return `<div class="appointment-row status-${a.status}">
        <div class="appt-time">${hh}:${mm}</div>
        <div><div class="appt-name">${a.customerName}</div><div class="appt-phone">${a.customerPhone}</div></div>
        <div class="appt-service">${svcName}</div>
        <div class="appt-price">${a.price?a.price+' ₺':'—'}</div>
        <div><span class="status-badge badge-${a.status}">${STATUS_TR[a.status]}</span></div>
        <div class="appt-actions">
          ${a.status!=='cancelled'&&a.status!=='completed'?`<button class="btn-sm btn-confirm" onclick="quickStatus('${a.id}','confirmed')">Onayla</button>`:''}
          ${a.status!=='cancelled'&&a.status!=='completed'?`<button class="btn-sm btn-complete" onclick="quickStatus('${a.id}','completed')">Tamam</button>`:''}
          <button class="btn-sm btn-cancel" onclick="openStatusModal('${a.id}','${a.status}',${a.price||0},'${(a.notes||'').replace(/'/g,"\\'")}')">Düzenle</button>
          ${a.status!=='cancelled'?`<button class="btn-sm btn-cancel" onclick="cancelAppointment('${a.id}')">İptal</button>`:''}
        </div>
      </div>`;
    }).join('')+'</div>';
  }catch(e){container.innerHTML='<div class="empty-state">Bağlantı hatası.</div>';}
}

// Hızlı durum güncelle
async function quickStatus(id,status){
  try{
    const res=await fetch(`${API}/api/appointments/${id}`,{method:'PUT',headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'},body:JSON.stringify({status})});
    if(res.ok)loadAppointments();
  }catch(e){alert('Hata: '+e.message);}
}

// İptal
async function cancelAppointment(id){
  if(!confirm('Bu randevuyu iptal etmek istediğinize emin misiniz?'))return;
  try{
    const res=await fetch(`${API}/api/appointments/${id}`,{method:'DELETE',headers:{'Authorization':`Bearer ${token}`}});
    if(res.ok)loadAppointments();
  }catch(e){alert('Hata: '+e.message);}
}

// Modal aç/kapat
function openModal(id){document.getElementById(id).classList.add('open');}
function closeModal(id){document.getElementById(id).classList.remove('open');}

// Yeni randevu modal
function openNewModal(){
  document.getElementById('new-name').value='';
  document.getElementById('new-phone').value='';
  document.getElementById('new-service').value='';
  document.getElementById('new-duration').value='30';
  document.getElementById('new-price').value='';
  document.getElementById('new-notes').value='';
  document.getElementById('new-error').style.display='none';
  const picker=document.getElementById('date-picker');
  const dt=new Date(picker.value+'T09:00');
  document.getElementById('new-datetime').value=dt.toISOString().slice(0,16);
  openModal('modal-new');
}

// Hizmet seçince süre ve fiyat otomatik doldur
document.getElementById('new-service')?.addEventListener('change',function(){
  const opt=this.options[this.selectedIndex];
  if(opt.dataset.duration)document.getElementById('new-duration').value=opt.dataset.duration;
  if(opt.dataset.priceMin)document.getElementById('new-price').value=opt.dataset.priceMin;
});

async function saveNewAppointment(){
  const name=document.getElementById('new-name').value.trim();
  const phone=document.getElementById('new-phone').value.trim();
  const service=document.getElementById('new-service').value;
  const datetime=document.getElementById('new-datetime').value;
  const duration=parseInt(document.getElementById('new-duration').value);
  const price=parseFloat(document.getElementById('new-price').value)||null;
  const notes=document.getElementById('new-notes').value.trim();
  const err=document.getElementById('new-error');
  err.style.display='none';
  if(!name||!phone||!service||!datetime){err.textContent='Ad, telefon, hizmet ve tarih zorunlu.';err.style.display='block';return;}
  try{
    const res=await fetch(`${API}/api/appointments`,{method:'POST',headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'},
      body:JSON.stringify({customerId:currentUser.id,customerName:name,customerPhone:phone,barberId:currentUser.id,barberName:currentUser.name,serviceType:service,appointmentDate:new Date(datetime).toISOString(),duration,price,notes})});
    const data=await res.json();
    if(!res.ok){err.textContent=data.error||'Hata';err.style.display='block';return;}
    closeModal('modal-new');loadAppointments();
  }catch(e){err.textContent=e.message;err.style.display='block';}
}

// Durum modal
function openStatusModal(id,status,price,notes){
  editingAppointmentId=id;
  document.getElementById('update-status').value=status;
  document.getElementById('update-price').value=price||'';
  document.getElementById('update-notes').value=notes||'';
  openModal('modal-status');
}

async function saveStatusUpdate(){
  const status=document.getElementById('update-status').value;
  const price=parseFloat(document.getElementById('update-price').value)||null;
  const notes=document.getElementById('update-notes').value.trim();
  try{
    const res=await fetch(`${API}/api/appointments/${editingAppointmentId}`,{method:'PUT',
      headers:{'Authorization':`Bearer ${token}`,'Content-Type':'application/json'},
      body:JSON.stringify({status,price,notes})});
    if(res.ok){closeModal('modal-status');loadAppointments();}
  }catch(e){alert('Hata: '+e.message);}
}

// Modal dışına tıkla kapat
document.querySelectorAll('.modal-overlay').forEach(el=>{
  el.addEventListener('click',e=>{if(e.target===el)el.classList.remove('open');});
});
</script>
</body>
</html>
